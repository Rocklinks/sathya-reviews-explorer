name: Keep Workflow Active — Sathya Mobiles

on:
  schedule:
    - cron: '0 10 1,16 * *'   # 10:00 UTC on 1st and 16th of every month
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Keep workflow alive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          echo "Last keepalive: $(date -u '+%Y-%m-%d %H:%M UTC')" > .keepalive

          git add .keepalive

          if git diff --staged --quiet; then
            echo "No changes to keepalive file"
          else
            git commit -m "chore: keepalive $(date -u '+%Y-%m-%d')"
            git push
          fi
