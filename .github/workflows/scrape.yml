name: Sathya Mobiles Reviews Scraper
on:
  schedule:
    - cron: '30 18 * * *'   # 12:00 AM IST = 18:30 UTC
  workflow_dispatch:
    inputs:
      reason:
        description: 'Manual run reason'
        required: false
        default: 'Manual trigger'
jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies for Chromium/Playwright
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libnss3 libatk-bridge2.0-0 libdrm2 libxkbcommon0 libxcomposite1 \
            libxdamage1 libxrandr2 libgbm1 libasound2t64 libpango-1.0-0 \
            libcairo2 libcups2 || true

      - name: Install Python packages
        run: pip install playwright

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium || true

      # Attempt 1
      - name: Run scraper attempt 1
        id: attempt1
        run: python scripts/scraper.py
        continue-on-error: true

      # Attempt 2 — only if attempt 1 failed
      - name: Run scraper attempt 2
        id: attempt2
        if: steps.attempt1.outcome == 'failure'
        run: python scripts/scraper.py
        continue-on-error: true

      # Attempt 3 — only if attempt 1 & 2 failed
      - name: Run scraper attempt 3
        id: attempt3
        if: steps.attempt1.outcome == 'failure' && steps.attempt2.outcome == 'failure'
        run: python scripts/scraper.py
        continue-on-error: true

      # Commit docs/sm.json back to the repo
      - name: Commit and push sm.json
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/sm.json
          if git diff --staged --quiet; then
            echo "sm.json unchanged — nothing to commit."
          else
            git commit -m "data: sm.json update $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
