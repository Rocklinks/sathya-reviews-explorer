name: Nightly Review Scraper — Sathya Mobiles

on:
  schedule:
    - cron: '30 18 * * *'   # 12:00 AM IST = 18:30 UTC
  workflow_dispatch:
    inputs:
      reason:
        description: 'Manual run reason'
        required: false
        default: 'Manual trigger'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # Attempt 1
      - name: Scrape — attempt 1
        id: attempt1
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO:  ${{ secrets.HF_REPO || 'RocklinKS/sathya-reviews' }}
        run: node scripts/scraper.js
        continue-on-error: true

      # Attempt 2 — immediate retry, no sleep
      - name: Scrape — attempt 2
        id: attempt2
        if: steps.attempt1.outcome == 'failure'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO:  ${{ secrets.HF_REPO || 'RocklinKS/sathya-reviews' }}
        run: node scripts/scraper.js
        continue-on-error: true

      # Attempt 3 — immediate retry, no sleep
      - name: Scrape — attempt 3
        id: attempt3
        if: steps.attempt1.outcome == 'failure' && steps.attempt2.outcome == 'failure'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO:  ${{ secrets.HF_REPO || 'RocklinKS/sathya-reviews' }}
        run: node scripts/scraper.js

      - name: Touch keepalive
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "Last scrape: $(date -u '+%Y-%m-%d %H:%M UTC')" > .scrape-keepalive
          git add .scrape-keepalive
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "chore: scrape run $(date -u '+%Y-%m-%d')"
            git push
          fi
