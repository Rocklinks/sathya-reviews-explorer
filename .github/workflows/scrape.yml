name: Nightly Review Scraper — Sathya Mobiles

on:
  schedule:
    - cron: '30 18 * * *'   # 12:00 AM IST = 18:30 UTC
  workflow_dispatch:
    inputs:
      reason:
        description: 'Manual run reason'
        required: false
        default: 'Manual trigger'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libnss3 libatk-bridge2.0-0 libdrm2 libxkbcommon0 \
            libxcomposite1 libxdamage1 libxrandr2 libgbm1 \
            libasound2t64 libpango-1.0-0 libcairo2 libcups2 || true

      - name: Install Python packages
        run: pip install playwright huggingface_hub --break-system-packages

      - name: Install Playwright Chromium
        run: python -m playwright install chromium

      # Attempt 1
      - name: Scrape — attempt 1
        id: attempt1
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO:  ${{ vars.HF_REPO || 'RocklinKS/sathya-reviews' }}
        run: python scripts/scraper.py
        continue-on-error: true

      # Attempt 2 — immediate, no sleep
      - name: Scrape — attempt 2
        id: attempt2
        if: steps.attempt1.outcome == 'failure'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO:  ${{ vars.HF_REPO || 'RocklinKS/sathya-reviews' }}
        run: python scripts/scraper.py
        continue-on-error: true

      # Attempt 3 — immediate, no sleep
      - name: Scrape — attempt 3
        id: attempt3
        if: steps.attempt1.outcome == 'failure' && steps.attempt2.outcome == 'failure'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO:  ${{ vars.HF_REPO || 'RocklinKS/sathya-reviews' }}
        run: python scripts/scraper.py

      - name: Touch keepalive
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "Last scrape: $(date -u '+%Y-%m-%d %H:%M UTC')" > .scrape-keepalive
          git add .scrape-keepalive
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "chore: scrape run $(date -u '+%Y-%m-%d')"
            git push
          fi
